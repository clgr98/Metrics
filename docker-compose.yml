services:
  alltest-kafka:
    image: apache/kafka:4.1.1
    container_name: alltest-kafka
    ports:
      - "${ALLTEST_KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@alltest-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${ALLTEST_KAFKA_ADVERTISED_HOST:-host.docker.internal}:${ALLTEST_KAFKA_PORT:-9092},INTERNAL://alltest-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  alltest-mqtt:
    image: eclipse-mosquitto:2.0
    container_name: alltest-mqtt
    ports:
      - "${ALLTEST_MQTT_PORT:-1885}:1885"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  alltest-source:
    build:
      context: .
    image: elcm-alltest-source:latest
    container_name: alltest-source
    depends_on:
      alltest-kafka:
        condition: service_healthy
      alltest-mqtt:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${ALLTEST_EXPORTER_PORT:-8000}:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: alltest-kafka:29092
      KAFKA_TOPIC: ${ALLTEST_KAFKA_TOPIC:-sensor_data_morse}
      MQTT_HOST: alltest-mqtt
      MQTT_PORT: "1885"
      MQTT_TOPIC: ${ALLTEST_MQTT_TOPIC:-mi/topic/elcm}
      PROMETHEUS_EXPORTER_PORT: "8000"
      PUBLISH_INTERVAL_SECONDS: ${ALLTEST_INTERVAL_SECONDS:-1}

  alltest-telegraf:
    image: telegraf:1.34
    container_name: alltest-telegraf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ALLTEST_INTERVAL_SECONDS: ${ALLTEST_INTERVAL_SECONDS:-1}
      TELEGRAF_OUTPUT_SOCKET: ${ALLTEST_TELEGRAF_OUTPUT_SOCKET:-tcp://host.docker.internal:8094}
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro

  alltest-prometheus:
    image: prom/prometheus:v2.55.1
    container_name: alltest-prometheus
    depends_on:
      alltest-source:
        condition: service_started
    ports:
      - "${ALLTEST_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
