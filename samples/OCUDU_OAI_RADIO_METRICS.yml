Name: OCUDU_OAI_RADIO_METRICS
Description: Validates the Metrics collectors while one OCUDU/OAI UE runs ping and iPerf2, and stores real scheduler and radio-channel telemetry.
Sequence:
  - Order: 1
    Task: Run.VirtualLabPrepare
    Config:
      ExecutionId: "@{ExecutionId}"
      TimeoutSeconds: 600
      PollIntervalSeconds: 2
      Services:
        - "iperf2-server"
      Ues:
        Count: 1
        StartIndex: 1
        WaitForRegistration: true
        RegistrationTimeout: 180

  - Order: 2
    Task: Flow.Parallel
    Children:
      - Task: Run.KafkaConsumerToInflux
        Config:
          ExecutionId: "@{ExecutionId}"
          Ip: "alltest-kafka"
          Port: "29092"
          Topic: "sensor_data_morse"
          Measurement: KAFKA
          Stop: "stop_kafka"
          Account: false
          Encryption: false

      - Task: Run.PrometheusToInflux
        Config:
          ExecutionId: "@{ExecutionId}"
          Url: "alltest-prometheus"
          Port: "9090"
          QueriesRange:
            - "windows_net_bytes_received_total"
            - "windows_net_bytes_sent_total"
          QueriesCustom:
            - "windows_net_bytes_received_total[5m]"
            - "windows_net_bytes_sent_total[5m]"
            - "process_cpu_seconds_total"
          Measurement: PROMETHEUS
          Step: "1s"
          Stop: "stop_prometheus"
          Account: false
          Encryption: false

      - Task: Run.MqttToInflux
        Config:
          ExecutionId: "@{ExecutionId}"
          Broker: "alltest-mqtt"
          Port: "1885"
          Topic: "mi/topic/elcm"
          Measurement: MQTT
          Stop: "stop_mqtt"
          Account: false
          Encryption: false

      - Task: Run.TelegrafToInflux
        Config:
          ExecutionId: "@{ExecutionId}"
          Measurement: Telegraf
          Stop: "stop_telegraf"
          Port: 8094
          Encryption: false

      - Task: Flow.Sequence
        Label: oai_ping_then_iperf2
        Children:
          - Task: Run.VirtualWorkload
            Label: ping_8s
            Config:
              ExecutionId: "@{ExecutionId}"
              TimeoutSeconds: 600
              Ues:
                Count: 1
                Prefix: "ue"
                StartIndex: 1
              Workload:
                Type: ping
                Target: "10.45.0.1"
                Duration: 8
                Count: 16
                Interval: 0.5
                MetricsInterval: 1
              FailurePolicy:
                OnWorkloadFailure: abort
              Tags:
                ExecutionId: "@{ExecutionId}"
                service: ping
                use_case: latency
                scenario: ocudu_oai_radio_metrics
                target_host: "10.45.0.1"
                protocol: icmp

          - Task: Run.VirtualWorkload
            Label: iperf2_tcp_30s
            Config:
              ExecutionId: "@{ExecutionId}"
              TimeoutSeconds: 600
              Ues:
                Count: 1
                Prefix: "ue"
                StartIndex: 1
              Workload:
                Type: iperf2
                Commands: "-c iperf2-server -p 5001 -t 30 -i 1 -P 5"
                MetricsInterval: 1
              FailurePolicy:
                OnWorkloadFailure: abort
              Tags:
                ExecutionId: "@{ExecutionId}"
                service: iperf2
                use_case: throughput
                scenario: ocudu_oai_radio_metrics
                host: iperf2-server
                protocol: tcp

      - Task: Flow.Sequence
        Children:
          - Task: Run.Delay
            Config:
              Time: 55
          - Task: Run.AddMilestone
            Config:
              Milestone: "stop_kafka"
          - Task: Run.AddMilestone
            Config:
              Milestone: "stop_prometheus"
          - Task: Run.AddMilestone
            Config:
              Milestone: "stop_mqtt"
          - Task: Run.AddMilestone
            Config:
              Milestone: "stop_telegraf"

  - Order: 3
    Task: Run.WaitForInflux
    Config:
      ExecutionId: "@{ExecutionId}"
      TimeoutSeconds: 180
      CheckInterval: 5
      TimeWindow: 180

Standard: true
Dashboard:
  - Name: "Temperature KAFKA"
    Measurement: "KAFKA"
    Field: "temperature"
    Type: Graph
    Interval: 1s
    Unit: celsius
    Size: [8, 12]
    Position: [0, 0]
    Lines: true
    Percentage: false

  - Name: "Memory used Telegraf"
    Measurement: "Telegraf"
    Field: "used_mem"
    Type: Graph
    Interval: 1s
    Unit: bytes
    Size: [8, 12]
    Position: [12, 0]
    Lines: true
    Percentage: false

  - Name: "Ping RTT avg"
    Measurement: "virtual_ue_ping_timeseries"
    Field: "ue01_ping_rtt_avg_ms"
    Type: Graph
    Interval: 1s
    Unit: ms
    Size: [8, 12]
    Position: [0, 8]
    Lines: true
    Dots: false
    Percentage: false

  - Name: "iPerf2 throughput"
    Measurement: "virtual_ue_iperf2_timeseries"
    Field: "ue01_iperf2_tcp_stream_total_throughput_bps"
    Type: Graph
    Interval: 1s
    Unit: bps
    Size: [8, 12]
    Position: [12, 8]
    Lines: true
    Dots: false
    Percentage: false

  - Name: "5G CQI"
    Measurement: "virtual_ran_ue_timeseries"
    Field: "ue01_ran_cqi"
    Type: Graph
    Interval: 1s
    Unit: short
    Size: [8, 12]
    Position: [0, 16]
    Lines: true
    Dots: true
    Percentage: false

  - Name: "5G MCS DL and UL"
    Measurement: "virtual_ran_ue_timeseries"
    Fields:
      - "ue01_ran_dl_mcs"
      - "ue01_ran_ul_mcs"
    Legend:
      - "DL MCS"
      - "UL MCS"
    Type: Graph
    Interval: 1s
    Unit: short
    Size: [8, 12]
    Position: [12, 16]
    Lines: true
    Dots: true
    Percentage: false

  - Name: "5G scheduler bitrate"
    Measurement: "virtual_ran_ue_timeseries"
    Fields:
      - "ue01_ran_dl_bitrate_bps"
      - "ue01_ran_ul_bitrate_bps"
    Legend:
      - "DL bitrate"
      - "UL bitrate"
    Type: Graph
    Interval: 1s
    Unit: bps
    Size: [8, 12]
    Position: [0, 24]
    Lines: true
    Dots: false
    Percentage: false

  - Name: "Radio SNR and RSRP"
    Measurement: "radio_channel_timeseries"
    Fields:
      - "ue01_radio_pusch_snr_db"
      - "ue01_radio_pusch_rsrp_db"
      - "ue01_radio_pucch_snr_db"
    Legend:
      - "PUSCH SNR"
      - "PUSCH RSRP"
      - "PUCCH SNR"
    Type: Graph
    Interval: 1s
    Unit: dB
    Size: [8, 12]
    Position: [12, 24]
    Lines: true
    Dots: true
    Percentage: false

  - Name: "HARQ error rate DL and UL"
    Measurement: "virtual_ran_ue_timeseries"
    Fields:
      - "ue01_ran_dl_harq_error_percent"
      - "ue01_ran_ul_harq_error_percent"
    Legend:
      - "DL HARQ error"
      - "UL HARQ error"
    Type: Graph
    Interval: 1s
    Unit: percent
    Size: [8, 12]
    Position: [0, 32]
    Lines: true
    Dots: true
    Percentage: false

  - Name: "Timing advance"
    Measurement: "radio_channel_timeseries"
    Fields:
      - "ue01_radio_timing_advance_ns"
      - "ue01_radio_pucch_timing_advance_ns"
      - "ue01_radio_pusch_timing_advance_ns"
    Legend:
      - "TA"
      - "PUCCH TA"
      - "PUSCH TA"
    Type: Graph
    Interval: 1s
    Unit: ns
    Size: [8, 12]
    Position: [12, 32]
    Lines: true
    Dots: true
    Percentage: false
