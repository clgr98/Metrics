[agent]
  interval = "${ALLTEST_INTERVAL_SECONDS}s"
  round_interval = false
  # ELCM only opens the socket during a testcase. Keep at most two collection
  # intervals so a new execution cannot inherit minutes of buffered samples.
  metric_batch_size = 1
  metric_buffer_limit = 2
  collection_jitter = "0s"
  flush_interval = "${ALLTEST_INTERVAL_SECONDS}s"
  flush_jitter = "0s"
  omit_hostname = false

[global_tags]
  source = "alltest-telegraf"

[[inputs.mem]]
  name_override = "mem"

[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = true
  report_active = true
  name_override = "cpu"

[[outputs.socket_writer]]
  address = "${TELEGRAF_OUTPUT_SOCKET}"
  data_format = "json"
  json_timestamp_units = "1s"
